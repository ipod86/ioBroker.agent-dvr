version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
      time: "00:05"
      timezone: Europe/Berlin
    open-pull-requests-limit: 15
    assignees:
      - ipod86
    versioning-strategy: increase
    cooldown:
      default: 7
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
      time: "00:05"
      timezone: Europe/Berlin
    open-pull-requests-limit: 15
    assignees:
      - ipod86
