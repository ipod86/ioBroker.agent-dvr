<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AgentDVR</title>
<style>
:root {
    --bg:      #0d0d0d;
    --surface: #1a1a1a;
    --border:  #2e2e2e;
    --accent:  #2196f3;
    --text:    #e0e0e0;
    --muted:   #777;
    --green:   #4caf50;
    --red:     #f44336;
    --orange:  #ff9800;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 16px; display: flex; align-items: center; gap: 12px; height: 48px; flex-shrink: 0; }
header h1 { font-size: 15px; font-weight: 600; color: var(--accent); white-space: nowrap; }
#conn-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); flex-shrink: 0; transition: background .3s; }
#conn-dot.on { background: var(--green); }
nav { display: flex; }
nav button { background: none; border: none; color: var(--muted); padding: 0 14px; height: 48px; cursor: pointer; font-size: 13px; border-bottom: 2px solid transparent; }
nav button.active { color: var(--text); border-bottom-color: var(--accent); }
nav button:hover { color: var(--text); }

main { flex: 1; overflow: hidden; min-height: 0; }
.view { display: none; height: 100%; }
.view.active { display: flex; flex-direction: column; }

/* Live view */
#view-live { padding: 8px; gap: 6px; overflow: hidden; }
#info-banner { flex-shrink: 0; display: none; background: #1a1200; border: 1px solid var(--orange); color: var(--orange); padding: 8px 12px; border-radius: 4px; font-size: 13px; line-height: 1.5; }
#info-banner.visible { display: block; }
#info-banner code { background: rgba(255,255,255,.07); padding: 1px 5px; border-radius: 3px; font-size: 12px; }
#info-banner button { margin-top: 6px; background: var(--orange); color: #000; border: none; padding: 3px 10px; border-radius: 3px; cursor: pointer; font-size: 12px; display: block; }
#cam-toolbar { flex-shrink: 0; display: flex; gap: 5px; flex-wrap: wrap; }
.chip { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 3px 10px; font-size: 12px; cursor: pointer; user-select: none; white-space: nowrap; }
.chip.on { background: var(--accent); border-color: var(--accent); color: #fff; }

/* Camera grid — columns/rows set by JS */
#cam-grid { flex: 1; min-height: 0; display: grid; gap: 6px; }
.cam-tile { background: #000; border-radius: 4px; overflow: hidden; position: relative; cursor: zoom-in; min-width: 0; min-height: 0; }
.cam-tile img { width: 100%; height: 100%; object-fit: contain; display: block; }
.cam-label { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,.7)); padding: 16px 7px 4px; font-size: 11px; pointer-events: none; }
.dot { position: absolute; top: 5px; right: 5px; width: 7px; height: 7px; border-radius: 50%; }
.dot.on  { background: var(--green); }
.dot.off { background: var(--red); }
.empty-grid { display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 14px; }

/* Recordings view */
#view-rec { padding: 12px; overflow-y: auto; }
#rec-toolbar { flex-shrink: 0; display: flex; gap: 8px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; }
#rec-select { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 4px; font-size: 13px; }
.rec-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
.rec-tile { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; cursor: pointer; }
.rec-tile:hover { border-color: var(--accent); }
.rec-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #000; display: block; }
.rec-info { padding: 6px 8px; font-size: 11px; color: var(--muted); line-height: 1.4; }
.rec-info b { display: block; color: var(--text); font-size: 12px; }

/* Modals */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 200; align-items: center; justify-content: center; }
.overlay.open { display: flex; }
#modal-cam .modal { width: min(1400px, 99vw); background: #000; border-radius: 6px; padding: 6px; }
#fullscreen-img { width: 100%; display: block; border-radius: 2px; max-height: 95dvh; object-fit: contain; }
#modal-video .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; width: min(960px, 96vw); }
#modal-video h2 { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
#video-el { width: 100%; background: #000; border-radius: 4px; max-height: 75dvh; display: block; }
.btn-row { display: flex; justify-content: flex-end; margin-top: 10px; }
.btn { padding: 6px 14px; border-radius: 4px; border: none; cursor: pointer; font-size: 13px; background: var(--border); color: var(--text); }

#statusbar { background: var(--surface); border-top: 1px solid var(--border); padding: 3px 14px; font-size: 11px; color: var(--muted); flex-shrink: 0; }
#statusbar.err { color: var(--red); }
</style>
</head>
<body>

<header>
    <div id="conn-dot" title="Live-Updates"></div>
    <h1>&#9654; AgentDVR</h1>
    <nav>
        <button id="tab-live" class="active" onclick="showView('live')">Live</button>
        <button id="tab-rec"  onclick="showView('rec')">Aufnahmen</button>
    </nav>
</header>

<main>
    <div id="view-live" class="view active">
        <div id="info-banner"></div>
        <div id="cam-toolbar"></div>
        <div id="cam-grid"></div>
    </div>
    <div id="view-rec" class="view">
        <div id="rec-toolbar">
            <select id="rec-select"><option value="">Kamera wählen…</option></select>
            <button class="btn" style="background:var(--accent);color:#fff" onclick="loadRecordings()">Laden</button>
        </div>
        <div id="rec-grid" class="rec-grid"></div>
    </div>
</main>

<div id="statusbar">Lade…</div>

<div class="overlay" id="modal-cam">
    <div class="modal" onclick="closeOverlay('modal-cam')">
        <img id="fullscreen-img" src="" alt="">
    </div>
</div>
<div class="overlay" id="modal-video">
    <div class="modal">
        <h2 id="video-title"></h2>
        <video id="video-el" controls playsinline preload="none"></video>
        <div class="btn-row"><button class="btn" onclick="closeVideo()">Schlie&#223;en</button></div>
    </div>
</div>

<script>
'use strict';

let INST    = 'agent-dvr.0';
let BASE    = '';
let cameras = {};
let hidden  = new Set(JSON.parse(localStorage.getItem('advr_hidden') || '[]'));

// ── Banner ──────────────────────────────────────────────────────────────────
function showBanner(html, withRetry) {
    const b = document.getElementById('info-banner');
    b.innerHTML = html + (withRetry ? '<button onclick="location.reload()">Neu laden</button>' : '');
    b.classList.add('visible');
}
function hideBanner() { document.getElementById('info-banner').classList.remove('visible'); }

// ── Load data via REST ───────────────────────────────────────────────────────
async function loadData() {
    status('Lade Kameras…');
    try {
        const r = await fetch('/agent-dvr/api/cameras', { signal: AbortSignal.timeout(8000) });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const data = await r.json();
        if (data.error) throw new Error(data.error);

        INST    = data.instance || 'agent-dvr.0';
        BASE    = data.base    || '';
        cameras = data.cameras || {};

        const count = Object.keys(cameras).length;
        if (!count) {
            showBanner('<strong>Keine Kameras</strong><br>Adapter läuft, aber keine Kameras registriert.<br>AgentDVR erreichbar? (IP/Port prüfen)', true);
            status('Keine Kameras · ' + INST, true);
            return;
        }

        hideBanner();
        status(count + ' Kamera(s) · ' + INST + (BASE ? ' · ' + BASE : ''));
        renderChips();
        renderGrid();
        renderRecSelect();
        trySocketLive();
    } catch (e) {
        showBanner('<strong>Ladefehler</strong><br>' + esc(e.message), true);
        status('Fehler: ' + e.message, true);
    }
}

// ── Optional live updates via socket.io ─────────────────────────────────────
function trySocketLive() {
    if (typeof io === 'undefined') return;
    try {
        const s = io({ transports: ['websocket', 'polling'], reconnection: true });
        s.on('connect',    () => { dot(true);  s.emit('subscribe', INST + '.cam_*.data.online', () => {}); });
        s.on('disconnect', () => dot(false));
        s.on('stateChange', (id, state) => {
            if (!state || !id.startsWith(INST + '.')) return;
            const camKey = id.slice(INST.length + 1).split('.')[0];
            if (!cameras[camKey]) return;
            cameras[camKey].online = !!state.val;
            const d = document.querySelector(`[data-cam="${camKey}"] .dot`);
            if (d) d.className = 'dot ' + (state.val ? 'on' : 'off');
        });
    } catch (_) {}
}

// ── Views ────────────────────────────────────────────────────────────────────
function showView(name) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('view-' + name).classList.add('active');
    document.getElementById('tab-'  + name).classList.add('active');
    if (name === 'live') updateGridLayout();
}

// ── Chips ─────────────────────────────────────────────────────────────────────
function renderChips() {
    const tb = document.getElementById('cam-toolbar');
    tb.innerHTML = '';
    if (!Object.keys(cameras).length) return;
    addChip(tb, 'Alle', hidden.size === 0, () => { hidden.clear(); saveHidden(); renderChips(); renderGrid(); });
    Object.entries(cameras).forEach(([key, cam]) => {
        addChip(tb, cam.name, !hidden.has(key), () => {
            hidden.has(key) ? hidden.delete(key) : hidden.add(key);
            saveHidden(); renderChips(); renderGrid();
        });
    });
}
function addChip(parent, label, active, onclick) {
    const c = document.createElement('span');
    c.className = 'chip' + (active ? ' on' : '');
    c.textContent = label;
    c.onclick = onclick;
    parent.appendChild(c);
}
function saveHidden() { localStorage.setItem('advr_hidden', JSON.stringify([...hidden])); }

// ── Grid layout ───────────────────────────────────────────────────────────────
let gridObserver = null;

function calcLayout(n, W, H, gap) {
    // Find (cols, rows) that maximises camera area on screen.
    // Each camera is 16:9 letterboxed inside its tile.
    let bestCols = 1, bestScore = -1;
    for (let cols = 1; cols <= n; cols++) {
        const rows  = Math.ceil(n / cols);
        const tileW = (W - gap * (cols - 1)) / cols;
        const tileH = (H - gap * (rows - 1)) / rows;
        const camW  = Math.min(tileW, tileH * 16 / 9);
        const score = camW * camW * (9 / 16);
        if (score > bestScore) { bestScore = score; bestCols = cols; }
    }
    return { cols: bestCols, rows: Math.ceil(n / bestCols) };
}

function updateGridLayout() {
    const grid  = document.getElementById('cam-grid');
    const tiles = grid.querySelectorAll('.cam-tile');
    const n     = tiles.length;
    if (!n) return;

    const W = grid.clientWidth;
    const H = grid.clientHeight;
    if (W < 10 || H < 10) return;

    const { cols, rows } = calcLayout(n, W, H, 6);
    grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    grid.style.gridTemplateRows    = `repeat(${rows}, 1fr)`;
}

function renderGrid() {
    const grid    = document.getElementById('cam-grid');
    const visible = Object.entries(cameras).filter(([k]) => !hidden.has(k));
    grid.innerHTML = '';
    grid.style.gridTemplateColumns = '';
    grid.style.gridTemplateRows    = '';

    if (!visible.length) {
        grid.innerHTML = '<div class="empty-grid">Keine Kameras sichtbar – Chip oben anklicken.</div>';
        return;
    }

    visible.forEach(([key, cam]) => {
        const tile  = document.createElement('div');
        tile.className  = 'cam-tile';
        tile.dataset.cam = key;

        const img   = document.createElement('img');
        img.alt = cam.name;
        if (cam.mjpegUrl) {
            img.src = cam.mjpegUrl;
            img.onerror = () => { if (cam.snapshotUrl && img.src !== cam.snapshotUrl) img.src = cam.snapshotUrl; };
        } else if (cam.snapshotUrl) {
            img.src = cam.snapshotUrl;
        }

        const label = document.createElement('div');
        label.className   = 'cam-label';
        label.textContent = cam.name;

        const dotEl = document.createElement('div');
        dotEl.className = 'dot ' + (cam.online ? 'on' : 'off');

        tile.onclick = () => openFullscreen(cam);
        tile.append(img, label, dotEl);
        grid.appendChild(tile);
    });

    // Observe grid size changes (e.g. toolbar reflow, orientation change)
    if (!gridObserver) {
        gridObserver = new ResizeObserver(() => updateGridLayout());
        gridObserver.observe(grid);
    }
    updateGridLayout();
}

function openFullscreen(cam) {
    document.getElementById('fullscreen-img').src = cam.mjpegUrl || cam.snapshotUrl || '';
    document.getElementById('modal-cam').classList.add('open');
}

// ── Recordings ────────────────────────────────────────────────────────────────
function renderRecSelect() {
    const sel = document.getElementById('rec-select');
    sel.innerHTML = '<option value="">Kamera wählen…</option>';
    Object.entries(cameras).forEach(([key, cam]) => {
        const o = document.createElement('option');
        o.value = key; o.textContent = cam.name;
        sel.appendChild(o);
    });
}

async function loadRecordings() {
    const key  = document.getElementById('rec-select').value;
    if (!key) return;
    const cam  = cameras[key];
    const grid = document.getElementById('rec-grid');
    grid.innerHTML = '<p style="color:var(--muted);padding:12px">Lade…</p>';
    try {
        const r = await fetch('/agent-dvr/api/recordings?camKey=' + encodeURIComponent(key),
                              { signal: AbortSignal.timeout(8000) });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const items = await r.json();
        if (!Array.isArray(items) || !items.length) {
            grid.innerHTML = '<p style="color:var(--muted);padding:12px">Keine Aufnahmen.<br>' +
                '<small>enableEventDps muss in der Adapter-Config aktiv sein.</small></p>';
            return;
        }
        grid.innerHTML = '';
        items.forEach(rec => {
            const tile  = document.createElement('div'); tile.className = 'rec-tile';
            const thumb = document.createElement('img'); thumb.className = 'rec-thumb'; thumb.alt = '';
            const info  = document.createElement('div'); info.className = 'rec-info';
            thumb.src = rec.thumb || (cam && cam.snapshotUrl) || '';
            info.innerHTML = '<b>' + esc(rec.date + ' ' + rec.time) + '</b>' +
                esc((rec.dur ? rec.dur + 's' : '') + (rec.size ? ' · ' + rec.size + ' MB' : '')) +
                (rec.tag ? ' <span style="color:var(--accent);font-size:10px">' + esc(rec.tag) + '</span>' : '');
            tile.onclick = () => playRec(rec);
            tile.append(thumb, info);
            grid.appendChild(tile);
        });
    } catch (e) {
        grid.innerHTML = '<p style="color:var(--muted);padding:12px">Fehler: ' + esc(e.message) + '</p>';
    }
}

function playRec(rec) {
    const url = rec.video || rec.url || rec.mp4Url || '';
    if (!url) return;
    document.getElementById('video-title').textContent = (rec.date || '') + ' ' + (rec.time || '');
    document.getElementById('video-el').src = url.startsWith('http') ? url : BASE + url;
    document.getElementById('modal-video').classList.add('open');
}
function closeVideo() {
    const v = document.getElementById('video-el');
    v.pause(); v.removeAttribute('src'); v.load();
    closeOverlay('modal-video');
}

// ── Util ──────────────────────────────────────────────────────────────────────
function esc(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function status(msg, err) { const s = document.getElementById('statusbar'); s.textContent = msg; s.className = err ? 'err' : ''; }
function dot(on) { document.getElementById('conn-dot').className = on ? 'on' : ''; }
function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.overlay').forEach(el =>
    el.addEventListener('click', e => { if (e.target === el) { if (el.id === 'modal-video') closeVideo(); else closeOverlay(el.id); } })
);

loadData();
</script>
<script src="/socket.io/socket.io.js"></script>
</body>
</html>
